name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: techeng_test
          POSTGRES_USER: techeng
          POSTGRES_PASSWORD: techeng_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techeng"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: backend
        run: ./mvnw verify
        env:
          SPRING_PROFILES_ACTIVE: test
