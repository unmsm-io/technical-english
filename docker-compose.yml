services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: techeng
      POSTGRES_USER: techeng
      POSTGRES_PASSWORD: techeng_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techeng"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
